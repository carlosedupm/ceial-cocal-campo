name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs-validate:
    name: Docs - Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/validate-project.mjs
      - run: node scripts/validate-br-refs.mjs

  backend:
    name: Backend - Test & Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-bookworm
        env:
          POSTGRES_USER: cocal
          POSTGRES_PASSWORD: cocal
          POSTGRES_DB: cocal_campo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cocal -d cocal_campo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - working-directory: backend
        env:
          DATABASE_URL: postgres://cocal:cocal@localhost:5432/cocal_campo?sslmode=disable
        run: |
          go mod download
          go test ./...
          go test -tags=integration ./...
          go build -o /dev/null ./cmd/api

  frontend:
    name: Frontend - Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - working-directory: frontend
        run: |
          npm ci
          npm test
          npm run build
